<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Emille AI MODO DIOS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#chatbox {
  width: 90%;
  max-width: 500px;
  height: 300px;
  background: #1e293b;
  margin: auto;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
}

.user { color: #38bdf8; text-align: right; }
.bot { color: #22c55e; text-align: left; }

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

canvas {
  max-width: 90%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🤖 Emille AI MODO DIOS</h1>

<div id="chatbox"></div>

<input id="userInput" placeholder="Escribe o habla...">
<button onclick="sendMessage()">Enviar</button>
<button onclick="voz()">🎙️ Hablar</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<br><br>

<input type="file" id="upload">
<canvas id="canvas"></canvas>

<br>

<button onclick="invertir()">Invertir</button>
<button onclick="grises()">Grises</button>
<button onclick="descargar()">💾 Descargar</button>

<h3>🎨 IA Imagen PRO</h3>
<input id="imagePrompt" placeholder="Describe la imagen">
<button onclick="crearImagen()">Generar</button>
<br>
<img id="resultadoImg" style="max-width:90%">

<script>
// ===== API KEY (PON LA TUYA)
const API_KEY = "PON_AQUI_TU_API_KEY";

// CHAT
function addMessage(type, text){
  let div = document.createElement("div");
  div.className = type;
  div.textContent = text;
  chatbox.appendChild(div);
  chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage(){
  let input = userInput.value;
  if(!input) return;

  addMessage("user", input);
  userInput.value = "";

  // matemáticas
  try {
    if(/[0-9+\-*/().^]/.test(input)){
      let r = math.evaluate(input);
      return addMessage("bot","🧮 "+r);
    }
  } catch {}

  // IA REAL
  if(API_KEY !== "PON_AQUI_TU_API_KEY"){
    let res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{role:"user",content:input}]
      })
    });

    let data = await res.json();
    let respuesta = data.choices[0].message.content;

    addMessage("bot", respuesta);
    hablar(respuesta);
  } else {
    addMessage("bot","Soy Emille 😎 (modo básico)");
  }
}

// VOZ
function voz(){
  let rec = new webkitSpeechRecognition();
  rec.lang = "es-ES";
  rec.start();

  rec.onresult = (e)=>{
    userInput.value = e.results[0][0].transcript;
    sendMessage();
  };
}

// HABLAR
function hablar(texto){
  let msg = new SpeechSynthesisUtterance(texto);
  speechSynthesis.speak(msg);
}

// LIMPIAR
function limpiar(){
  chatbox.innerHTML = "";
}

// CANVAS
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

upload.onchange = e=>{
  let img = new Image();
  img.src = URL.createObjectURL(e.target.files[0]);

  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
  };
};

function invertir(){
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;
  for(let i=0;i<d.length;i+=4){
    d[i]=255-d[i];
    d[i+1]=255-d[i+1];
    d[i+2]=255-d[i+2];
  }
  ctx.putImageData(img,0,0);
}

function grises(){
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;
  for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    d[i]=d[i+1]=d[i+2]=avg;
  }
  ctx.putImageData(img,0,0);
}

// DESCARGAR
function descargar(){
  let link = document.createElement("a");
  link.download = "imagen.png";
  link.href = canvas.toDataURL();
  link.click();
}

// IA IMÁGENES
function crearImagen(){
  let p = imagePrompt.value;
  let estilo = "ultra realistic, 3D render, 4k, cinematic lighting";
  resultadoImg.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(p + "," + estilo);
}
</script>

</body>
</html>
