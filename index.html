<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Emille AI ULTRA DIOS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#chatbox {
  width: 90%;
  max-width: 500px;
  height: 300px;
  background: #1e293b;
  margin: auto;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
}

.user { color: #38bdf8; text-align: right; }
.bot { color: #22c55e; text-align: left; }

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

canvas {
  max-width: 90%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🤖 Emille AI ULTRA DIOS</h1>

<div id="chatbox"></div>

<input id="userInput" placeholder="Escribe o habla...">
<button onclick="sendMessage()">Enviar</button>
<button onclick="voz()">🎙️</button>
<button onclick="limpiar()">🧹</button>

<br><br>

<input type="file" id="upload">
<canvas id="canvas"></canvas>

<br>

<button onclick="invertir()">Invertir</button>
<button onclick="grises()">Grises</button>
<button onclick="brillo()">Brillo</button>
<button onclick="descargar()">💾</button>

<h3>🎨 IA Imagen</h3>
<input id="imagePrompt">
<button onclick="crearImagen()">Generar</button>
<br>
<img id="resultadoImg" style="max-width:90%">

<script>
// CHAT
function addMessage(type,text){
  let d=document.createElement("div");
  d.className=type;
  d.textContent=text;
  chatbox.appendChild(d);
  chatbox.scrollTop=chatbox.scrollHeight;
}

async function sendMessage(){
  let msg=userInput.value;
  if(!msg) return;

  addMessage("user",msg);
  userInput.value="";

  // matemáticas
  try{
    if(/[0-9+\-*/().^]/.test(msg)){
      let r=math.evaluate(msg);
      return addMessage("bot","🧮 "+r);
    }
  }catch{}

  // IA backend
  let res=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  let data=await res.json();
  addMessage("bot",data.reply);
  hablar(data.reply);
}

// VOZ
function voz(){
  let rec=new webkitSpeechRecognition();
  rec.lang="es-ES";
  rec.start();
  rec.onresult=e=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };
}

function hablar(t){
  let msg=new SpeechSynthesisUtterance(t);
  speechSynthesis.speak(msg);
}

function limpiar(){
  chatbox.innerHTML="";
}

// CANVAS
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

upload.onchange=e=>{
  let img=new Image();
  img.src=URL.createObjectURL(e.target.files[0]);
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
  };
};

function invertir(){
  let img=ctx.getImageData(0,0,canvas.width,canvas.height);
  let d=img.data;
  for(let i=0;i<d.length;i+=4){
    d[i]=255-d[i];
    d[i+1]=255-d[i+1];
    d[i+2]=255-d[i+2];
  }
  ctx.putImageData(img,0,0);
}

function grises(){
  let img=ctx.getImageData(0,0,canvas.width,canvas.height);
  let d=img.data;
  for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    d[i]=d[i+1]=d[i+2]=avg;
  }
  ctx.putImageData(img,0,0);
}

function brillo(){
  let img=ctx.getImageData(0,0,canvas.width,canvas.height);
  let d=img.data;
  for(let i=0;i<d.length;i+=4){
    d[i]+=30; d[i+1]+=30; d[i+2]+=30;
  }
  ctx.putImageData(img,0,0);
}

function descargar(){
  let a=document.createElement("a");
  a.download="imagen.png";
  a.href=canvas.toDataURL();
  a.click();
}

// IA IMAGEN
function crearImagen(){
  let p=imagePrompt.value;
  let estilo="ultra realistic, 3D render, cinematic lighting, 4k";
  resultadoImg.src="https://image.pollinations.ai/prompt/"+encodeURIComponent(p+","+estilo);
}
</script>

</body>
</html>
